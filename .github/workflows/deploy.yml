name: API CI + Product Regression + Deploy (VPS)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fastroute-governance-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DOMAIN_REPO: fastroute-domain
  API_REPO: fastroute-api
  MOBILE_REPO: fastroute-mobile-hybrid

jobs:
  regression-unit:
    name: Unit + Integration Regression (3 repos)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: domain

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.API_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.API_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: api

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Domain - lint/test/build
        run: |
          cd domain
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npm pack

      - name: API - lint/typecheck/test/build
        run: |
          cd api
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Mobile - typecheck/unit tests
        run: |
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run typecheck
          npm run test:unit

  mobile-ui-android:
    name: Functional UI (Android)
    runs-on: ubuntu-latest
    needs: [regression-unit]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: domain

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare domain package
        run: |
          cd domain
          npm ci
          npm run build
          npm pack

      - name: Build Android debug app
        env:
          EXPO_PUBLIC_E2E_BYPASS_LOGIN: "1"
        run: |
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npx expo prebuild -p android --non-interactive
          cd android
          ./gradlew assembleDebug

      - name: Run Maestro flow on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          script: |
            cd mobile
            bash ./scripts/ci/run-maestro-tests.sh android

  mobile-ui-ios:
    name: Functional UI (iOS)
    runs-on: macos-14
    needs: [regression-unit]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: domain

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT != '' && secrets.CROSS_REPO_PAT || github.token }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare domain package
        run: |
          cd domain
          npm ci
          npm run build
          npm pack

      - name: Build iOS simulator app
        env:
          EXPO_PUBLIC_E2E_BYPASS_LOGIN: "1"
        run: |
          set -euo pipefail
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npx expo prebuild -p ios --non-interactive
          cd ios
          pod install
          cd ..

          SIM_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$SIM_ID" ]; then
            echo "Nenhum simulador iPhone disponível" >&2
            exit 1
          fi

          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

          xcodebuild \
            -workspace ios/FastRoute.xcworkspace \
            -scheme FastRoute \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath ios/build \
            build

          APP_PATH=$(find ios/build/Build/Products -type d -name "FastRoute.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "App iOS não encontrada em ios/build/Build/Products" >&2
            exit 1
          fi

          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro flow on iOS simulator
        run: |
          cd mobile
          bash ./scripts/ci/run-maestro-tests.sh ios

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [regression-unit, mobile-ui-android, mobile-ui-ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout API
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fastroute-api:latest
            ghcr.io/${{ github.repository_owner }}/fastroute-api:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH deploy (docker compose pull/up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/deploy/fastroute

            IMAGE=ghcr.io/${{ github.repository_owner }}/fastroute-api:${{ github.sha }}
            LATEST=ghcr.io/${{ github.repository_owner }}/fastroute-api:latest

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker pull "$IMAGE"
            docker tag "$IMAGE" "$LATEST"

            PORT_3000_CONTAINERS=$(docker ps --filter "publish=3000" --format '{{.ID}}')
            if [ -n "$PORT_3000_CONTAINERS" ]; then
              docker ps --filter "publish=3000" --format 'Removing :3000 -> {{.ID}} {{.Names}} {{.Image}}'
              docker rm -f $PORT_3000_CONTAINERS
            fi

            docker compose up -d --pull never --force-recreate --remove-orphans

            docker logout ghcr.io || true
            docker image prune -f
