name: API CI + Deploy (VPS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

concurrency:
  group: fastroute-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (lint, typecheck, tests, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [ ci ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fastroute-api:latest
            ghcr.io/${{ github.repository_owner }}/fastroute-api:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [ docker ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH deploy (docker compose pull/up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/fastroute

            IMAGE=ghcr.io/${{ github.repository_owner }}/fastroute-api:${{ github.sha }}
            LATEST=ghcr.io/${{ github.repository_owner }}/fastroute-api:latest

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker pull "$IMAGE"
            docker tag "$IMAGE" "$LATEST"

            # Libera a porta 3000 caso exista container antigo preso nela
            PORT_3000_CONTAINERS=$(docker ps --filter "publish=3000" --format '{{.ID}}')
            if [ -n "$PORT_3000_CONTAINERS" ]; then
              docker ps --filter "publish=3000" --format 'Removing :3000 -> {{.ID}} {{.Names}} {{.Image}}'
              docker rm -f $PORT_3000_CONTAINERS
            fi

            docker compose up -d --pull never --force-recreate --remove-orphans

            docker logout ghcr.io || true
            docker image prune -f
